<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Streaming Player</title>

  <!-- Video.js -->
  <link
    href="https://vjs.zencdn.net/8.10.0/video-js.css"
    rel="stylesheet"
  >

  <!-- YOUR CSS -->
  <link
    rel="stylesheet"
    href="watch.css"
  >

</head>

<body>

  <h2>🎬 Streaming Player</h2>

  <div class="top-buttons">

    <button onclick="history.back()">
      ⬅ Back
    </button>

    <button onclick="startStreaming()">
      ▶ Start Streaming
    </button>

  </div>

  <div class="player-wrapper">

    <div class="video-container">

      <video
        id="videoPlayer"
        class="video-js vjs-default-skin vjs-big-play-centered"
        controls
        preload="auto"
        playsinline
      ></video>

    </div>

  </div>

  <div class="status" id="status">
    Waiting for stream...
  </div>

  <div class="debug-box" id="debugBox">
    Debug logs will appear here...
  </div>

  <div class="disclaimer">

    <h3>⚠ Disclaimer</h3>

    <p>
      This website does not host, upload,
      store, or distribute any media files.
    </p>

    <p>
      All content is streamed from
      third-party sources.
    </p>

  </div>

  <!-- Video.js -->
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <!-- YOUR JS -->
  <script src="watch.js"></script>

</body>
</html>
