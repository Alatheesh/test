<!DOCTYPE html>
<html>
<head>
  <title>Watch</title>
</head>

<body style="background:black; text-align:center; color:white;">

<h2>🎬 Player</h2>

<button onclick="history.back()" style="padding:10px;">
  ⬅ Back
</button>

<br><br>

<button onclick="start()" style="padding:15px; font-size:16px;">
  ▶ Start Streaming
</button>

<br><br>

<video id="player" controls width="800" style="display:none;"></video>

<script>
function start(){
  const params = new URLSearchParams(location.search);
  const link = params.get("link");

  if(!link){
    alert("No video link found ❌");
    return;
  }

  const player = document.getElementById("player");
  player.style.display = "block";
  player.src = link;
}

// error handling
document.getElementById("player").onerror = () => {
  alert("⚠ Video failed to load");
};
</script>

</body>
</html>
