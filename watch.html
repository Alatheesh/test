<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Streaming Player</title>

<!-- VIDEO JS -->
<link
href="https://vjs.zencdn.net/8.10.0/video-js.css"
rel="stylesheet"
/>

<!-- CSS -->
<link
rel="stylesheet"
href="watch.css"
/>

</head>

<body>

<div class="bg-overlay"></div>

<button
class="back-btn"
onclick="history.back()"
>
← Back
</button>

<div class="main-container">

<h1 class="title">
🎬 Streaming Player
</h1>

<div class="player-wrapper">

<video
id="videoPlayer"
class="video-js vjs-default-skin vjs-big-play-centered"
controls
preload="auto"
playsinline
></video>

</div>

<div
class="status"
id="status"
>
Preparing stream...
</div>

<div
class="debug-box"
id="debugBox"
>
Logs will appear here...
</div>

</div>

<div class="disclaimer">

<h3>
⚠ Disclaimer
</h3>

<p>
This website does not host,
upload, store, or distribute
any media files.
</p>

<p>
All content is streamed from
third-party sources.
</p>

</div>

<!-- VIDEO JS -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<!-- JS -->
<script src="watch.js"></script>

</body>
</html>
