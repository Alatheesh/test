name: Randomized Space Visitor

on:
  schedule:
    # Starts the server twice a day (every 12 hours)
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping-spaces:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Execute Randomized Human Pings
      run: node ping.js

    - name: Upload Screenshot Confirmations
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visitor-screenshots
        path: screenshots/
        retention-days: 7
        
